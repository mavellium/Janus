services:
  # ==========================================
  # JANUS PRODUÇÃO
  # ==========================================
  janus-app:
    container_name: janus-app-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_URL_API=https://januscms.com.br/api
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.janus-prod.rule=Host(`januscms.com.br`) || Host(`www.januscms.com.br`)"
      - "traefik.http.routers.janus-prod.entrypoints=websecure"
      - "traefik.http.routers.janus-prod.tls.certresolver=myresolver"
      - "traefik.http.services.janus-prod.loadbalancer.server.port=3000"
      - "traefik.http.services.janus-prod.loadbalancer.healthcheck.path=/login"
      - "traefik.http.services.janus-prod.loadbalancer.healthcheck.interval=10s"
    depends_on:
      janus-db:
        condition: service_healthy

  janus-db:
    image: postgres:15-alpine
    container_name: janus-db-prod
    restart: always
    environment:
      POSTGRES_USER: janus_admin
      POSTGRES_PASSWORD: janus_password_prod
      POSTGRES_DB: janus_db
    volumes:
      - janus-prod-db-data:/var/lib/postgresql/data
    ports:
      - "5440:5432" # Porta externa ajustada para evitar conflitos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus_admin -d janus_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # ==========================================
  # JANUS TESTE
  # ==========================================
  janus-app-test:
    container_name: janus-app-test
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_URL_API=https://teste.januscms.com.br/api
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    env_file:
      - .env.test
    volumes:
      - ./.env.test:/app/.env
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.janus-test.rule=Host(`teste.januscms.com.br`)"
      - "traefik.http.routers.janus-test.entrypoints=websecure"
      - "traefik.http.routers.janus-test.tls.certresolver=myresolver"
      - "traefik.http.services.janus-test.loadbalancer.server.port=3000"
      - "traefik.http.services.janus-test.loadbalancer.healthcheck.path=/login"
      - "traefik.http.services.janus-test.loadbalancer.healthcheck.interval=10s"
    depends_on:
      janus-db-test:
        condition: service_healthy

  janus-db-test:
    image: postgres:15-alpine
    container_name: janus-db-test
    restart: always
    environment:
      POSTGRES_USER: janus_tester
      POSTGRES_PASSWORD: janus_password_test
      POSTGRES_DB: janus_db_test
    volumes:
      - janus-test-db-data:/var/lib/postgresql/data
    ports:
      - "5441:5432" # Porta externa ajustada para evitar conflitos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus_tester -d janus_db_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
  traefik-public:
    external: true

volumes:
  janus-prod-db-data:
  janus-test-db-data: